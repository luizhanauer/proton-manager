name: Release Proton Manager

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout do Código
        uses: actions/checkout@v4

      - name: 🐹 Configurar Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.21"

      - name: 🟢 Configurar Node
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: 🔧 Instalar Dependências do Linux
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev build-essential pkg-config

      - name: 🔨 Instalar Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: 🏗️ Compilar Proton Manager
        run: |
          go mod tidy
          wails build -platform linux/amd64 -tags webkit2_41 -clean -o proton-manager

      - name: 📦 Preparar Empacotamento
        run: |
          mkdir -p dist/bin

          if [ ! -f "build/bin/proton-manager" ]; then
            echo "❌ Erro: Binário build/bin/proton-manager não encontrado!"
            exit 1
          fi
          cp build/bin/proton-manager dist/bin/

          if [ ! -f "scripts/install.sh" ]; then
            echo "❌ Erro: Script scripts/install.sh não encontrado!"
            exit 1
          fi
          cp scripts/install.sh dist/install.sh

          if [ -f "build/appicon.png" ]; then
            cp build/appicon.png dist/appicon.png
          fi

          chmod +x dist/install.sh
          chmod +x dist/bin/proton-manager

          FILENAME="proton-manager_linux_amd64.tar.gz"
          cd dist
          tar -czf ../$FILENAME *
          cd ..

          echo "✅ Arquivo criado:"
          ls -lh $FILENAME

      - name: 🚀 Criar Release no GitHub
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: "*.tar.gz"
          name: Release ${{ github.ref_name }}
          tag_name: ${{ github.ref }}
          generate_release_notes: true
          draft: false
          prerelease: false